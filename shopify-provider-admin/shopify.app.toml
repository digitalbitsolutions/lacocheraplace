# This file stores configurations for your Shopify app.

client_id = "a855294f6e78b76e92d6dce223bdd291"
name = "Laco Prov Admin"
application_url = "https://bryan-interested-ham-exposed.trycloudflare.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_metaobjects,write_metaobjects,read_metaobject_definitions,write_metaobject_definitions,write_app_proxy"

[auth]
redirect_urls = [
  "https://bryan-interested-ham-exposed.trycloudflare.com/auth/callback",
  "https://bryan-interested-ham-exposed.trycloudflare.com/auth/shopify/callback",
  "https://bryan-interested-ham-exposed.trycloudflare.com/api/auth/callback",
]

[app_proxy]
url = "/apps/provider-applications"
prefix = "apps"
subpath = "provider-applications"

[webhooks]
api_version = "2024-10"

  # Handled by: /app/routes/webhooks.app.uninstalled.tsx
  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = ["app/uninstalled"]

  # Handled by: /app/routes/webhooks.app.scopes_update.tsx
  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  # Webhooks can have filters
  # Only receive webhooks for product updates with a product price >= 10.00
  # See: https://shopify.dev/docs/apps/build/webhooks/customize/filters
  # [[webhooks.subscriptions]]
  # topics = ["products/update"]
  # uri = "/webhooks/products/update"
  # filter = "variants.price:>=10.00"

  # Mandatory compliance topic for public apps only
  # See: https://shopify.dev/docs/apps/build/privacy-law-compliance
  # [[webhooks.subscriptions]]
  # uri = "/webhooks/customers/data_request"
  # compliance_topics = ["customers/data_request"]

  # [[webhooks.subscriptions]]
  # uri = "/webhooks/customers/redact"
  # compliance_topics = ["customers/redact"]

  # [[webhooks.subscriptions]]
  # uri = "/webhooks/shop/redact"
  # compliance_topics = ["shop/redact"]
